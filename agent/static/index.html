<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zowsup Agent Console</title>
<style>
:root{
  --bg:#f5f6fa;--card:#fff;--border:#e2e4ea;--text:#2c2c2c;--muted:#7b809a;
  --primary:#3b82f6;--danger:#ef4444;--success:#10b981;--warn:#f59e0b;
  --p10:10px;--r8:8px;--sh:0 1px 3px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font:14px/1.5 -apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}
nav{width:200px;background:var(--card);border-right:1px solid var(--border);padding:var(--p10);display:flex;flex-direction:column;gap:4px}
nav h2{font-size:15px;padding:8px 10px;color:var(--muted)}
nav button{text-align:left;padding:8px 10px;border:none;background:none;cursor:pointer;border-radius:var(--r8);font-size:13px}
nav button:hover{background:#f0f1f5}
nav button.active{background:var(--primary);color:#fff}
main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
main.chat-mode{overflow:hidden;padding:12px}
.card{background:var(--card);border-radius:var(--r8);box-shadow:var(--sh);padding:16px}
.card.chat-card{display:flex;flex-direction:column;height:100%;padding:12px}
.card.chat-card .chat-body{flex:1;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:2px;min-height:0}
.card.chat-card .chat-foot{padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
.chat-foot textarea{font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--r8);line-height:1.4;min-height:36px;max-height:120px}
.card h3{font-size:14px;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.card.chat-card h3{text-transform:none;letter-spacing:0;color:var(--text)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{flex:1}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600}
tr:hover{background:#f8f9fc}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-pending{background:#fef3c7;color:#b45309}
.badge-claimed{background:#dbeafe;color:#1e40af}
.badge-resolved{background:#d1fae5;color:#065f46}
.badge-high{background:#fce4ec;color:#c62828}
.badge-normal{background:#e8eaf6;color:#283593}
button{font-size:13px;padding:6px 14px;border:none;border-radius:var(--r8);cursor:pointer;font-weight:500}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:4px 10px;font-size:12px}
input,select,textarea{font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r8);width:200px}
textarea{width:100%;resize:vertical;min-height:60px}
.msg-bubble{max-width:80%;padding:8px 12px;border-radius:12px;margin:4px 0;font-size:13px;line-height:1.4;white-space:pre-wrap;word-break:break-word}
.msg-in{background:#e8f0fe;align-self:flex-start}
.msg-out{background:#e8f5e9;align-self:flex-end;margin-left:auto}
.msg-note{background:#fff3e0;font-style:italic;font-size:12px;align-self:flex-start}
.msg-meta{font-size:11px;color:var(--muted);margin-top:2px}
#msg-container{display:flex;flex-direction:column-reverse;gap:2px;overflow-y:auto}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:2px}
.field{margin-bottom:10px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:var(--r8);color:#fff;font-size:13px;z-index:999;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.msg-note-inline{margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,.1);font-style:italic;font-size:12px;color:var(--muted)}
.msg-trans{display:block;margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,.1);font-style:italic;font-size:12px;color:var(--muted)}
.msg-check{font-size:13px;margin-left:4px;display:inline-block;width:22px;letter-spacing:-4px}
.msg-check.sent{color:#999}
.msg-check.exec{color:#bbb}
.msg-check.delivered{color:#999}
.msg-check.read{color:#34b7f1}
.msg-check.failed{color:#ef4444}
.plugin-editor-row td{padding:0;border:none}
.plugin-editor-inner{margin:8px 10px;padding:10px;background:#f8f9fc;border-radius:var(--r8);border:1px solid var(--border)}
.plugin-editor-inner textarea{width:100%;min-height:120px;font-family:monospace;font-size:12px}
.plugin-row{cursor:pointer}
.plugin-row:hover{background:#f0f4ff}
.msg-bubble img,.msg-bubble video{display:block;margin:4px 0}
.msg-bubble img:hover{opacity:.85}
/* ── Log Modal ── */
.log-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.log-overlay.hidden{display:none}
.log-modal{background:#1a1a2e;border-radius:12px;width:85%;max-width:900px;height:70%;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.log-header{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);gap:10px}
.log-header h3{color:#e0e0e0;font-size:14px;margin:0;text-transform:none;letter-spacing:0;flex:1}
.log-header .log-status{font-size:11px;padding:2px 8px;border-radius:10px}
.log-status.live{background:#10b981;color:#fff}
.log-status.stale{background:#f59e0b;color:#fff}
.log-body{flex:1;overflow-y:auto;padding:12px 16px;font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:12px;line-height:1.6;color:#c0c0c0;white-space:pre-wrap;word-break:break-all}
.log-body::-webkit-scrollbar{width:6px}
.log-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.log-body .log-line{padding:1px 0}
.log-body .log-line.error{color:#ef4444}
.log-body .log-line.warn{color:#f59e0b}
.log-foot{display:flex;align-items:center;padding:8px 16px;border-top:1px solid rgba(255,255,255,.1);gap:8px}
.log-foot span{font-size:11px;color:rgba(255,255,255,.3)}
</style>

</head>
<body>
<nav>
  <h2>ZOWSUP CONSOLE</h2>
  <button onclick="switchTab('escalations')" id="tab-escalations" class="active">🟡 Escalations</button>
  <button onclick="switchTab('conversations')" id="tab-conversations">💬 Conversations</button>
  <button onclick="switchTab('plugins')" id="tab-plugins">🧩 Plugins</button>
  <button onclick="switchTab('bots')" id="tab-bots">🤖 Bots</button>
  <button onclick="switchTab('audit')" id="tab-audit">📋 Audit</button>
  <button onclick="switchTab('cluster')" id="tab-cluster" style="display:none">🖥 Cluster</button>
</nav>

<main id="main"></main>

<!-- ── Log Viewer Modal ── -->
<div id="log-overlay" class="log-overlay hidden" onclick="if(event.target===this)closeBotLogs()">
  <div class="log-modal">
    <div class="log-header">
      <h3 id="log-title">📋 Bot Logs</h3>
      <span id="log-status" class="log-status live">● LIVE</span>
      <button class="btn-outline btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="closeBotLogs()">✕</button>
    </div>
    <div id="log-body" class="log-body"></div>
    <div class="log-foot">
      <span id="log-line-count">0 lines</span>
      <span class="spacer"></span>
      <button class="btn-sm" style="background:rgba(255,255,255,.1);color:#fff" onclick="toggleLogAutoScroll()">Auto-scroll: ON</button>
    </div>
  </div>
</div>

<script>
const API = '';

function toast(msg,color='#333'){let t=document.createElement('div');t.className='toast';t.style.background=color;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500)}

async function api(url,opts={}){
  try{
    let r=await fetch(API+url,opts);
    if(!r.ok) throw new Error((await r.json()).detail||r.statusText);
    return await r.json();
  }catch(e){toast(e.message,'#ef4444');throw e}
}

// ── Tabs ──────────────────────────────────────────────────────────
let currentTab='escalations';
let detailMode=null; // {tab, id} when viewing a detail
let wsConn=null;     // WebSocket for real-time events

function wsClose(){
  if(wsConn){wsConn.close();wsConn=null;wsUrl='';}
}
let wsUrl='';
function wsConnectChat(botId,convId){
  let proto=location.protocol==='https:'?'wss:':'ws:';
  let url=`${proto}//${location.host}/api/bot/${botId}/events?tail=0`;
  if(wsConn&&wsUrl===url)return; // Already connected, don't duplicate
  wsClose();
  wsUrl=url;
  wsConn=new WebSocket(url);
  wsConn.onmessage=function(e){
    try{
      let evt=JSON.parse(e.data);
      if(evt.type==='message'){
        let msg=evt.data||{};
        let msgConv=botId+':'+(msg.lid||msg.from_full||'');
        if(msgConv!==convId)return;
        appendChatMessage(msg, convId);
      }else if(evt.type==='message_updated'){
        let upd=evt.data||{};
        if(upd.conversation_id!==convId)return;
        appendNoteDirect(upd);
      }else if(evt.type==='message_status'){
        let st=evt.data||{};
        if(st.msgId) refreshChatStatus(st);
      }
    }catch(ex){}
  };
  wsConn.onclose=function(){wsConn=null;};
}

async function refreshChat(convId){
  let mc=document.getElementById('msg-container');if(!mc)return;
  let data=await api('/api/conversation/'+convId+'?limit=50');
  mc.innerHTML='';
  for(let m of data.messages){
    if(m.direction==='note')continue;
    mc.appendChild(renderMessage(m));
  }
}

function appendNoteDirect(upd){
  let mc=document.getElementById('msg-container');if(!mc)return;
  let bubble=mc.querySelector('[data-db-id="'+upd.db_id+'"]');
  if(!bubble)return;
  // Remove old note-inline if exists, then append new
  let old=bubble.querySelector('.msg-note-inline');if(old)old.remove();
  let div=document.createElement('div');div.className='msg-note-inline';
  div.innerHTML=(upd.note||'').replace(/\n/g,'<br>');
  let meta=bubble.querySelector(".msg-meta");if(meta)bubble.insertBefore(div,meta);else bubble.appendChild(div);
}

function renderMessage(m){if(m.direction==="note")return document.createTextNode("");let cls=m.direction==="incoming"?"msg-in":"msg-out";let check='';if(m.direction==="outgoing"){let s=(m.status||'').toUpperCase();let icon='',c='sent';if(s==='READ'||s==='READ_RECEIPT'){icon='\u2713\u2713';c='read'}else if(s==='DELIVERED'||s==='RECEIVED'){icon='\u2713\u2713';c='delivered'}else if(s==='SENT'||s==='SERVER_ACK'){icon='\u2713';c='sent'}else if(s==='EXECUTED'){icon='\u23F3';c='exec'}else if(s==='FAILED'||s==='ERROR'){icon='\u2717';c='failed'}else{icon='\u2713';c='sent'}check=`<span class="msg-check ${c}" data-msg-status="${s||'SENT'}">${icon}</span>`;}let b=document.createElement("div");b.className="msg-bubble "+cls;if(m.msg_id)b.setAttribute("data-msg-id",m.msg_id);if(m.id)b.setAttribute("data-db-id",m.id);let txt=(m.content||'').replace(/\n/g,'<br>');let hasMedia=m.media_url&&m.media_key&&m.id&&m.conversation_id;let mediaUrl=hasMedia?('/api/conversation/'+encodeURIComponent(m.conversation_id)+'/message/'+m.id+'/media'):'';let ct=m.content_type||'TEXT';let fname=m.media_file_name||'';let fsize=m.media_file_length?(' · '+(m.media_file_length>1048576?(m.media_file_length/1048576).toFixed(1)+'MB':(m.media_file_length>1024?(m.media_file_length/1024).toFixed(1)+'KB':m.media_file_length+'B'))):'';let html='';if(ct==='IMAGE'&&mediaUrl){html='<img src="'+mediaUrl+'" style="max-width:240px;max-height:240px;border-radius:8px;cursor:pointer" onclick="window.open(this.src)" loading="lazy" onerror="this.alt=\'[image load failed]\'">';}else if(ct==='VIDEO'&&mediaUrl){html='<video src="'+mediaUrl+'" controls style="max-width:300px;max-height:240px;border-radius:8px" preload="metadata"><\/video>';}else if(ct==='AUDIO'&&mediaUrl){html='<audio src="'+mediaUrl+'" controls style="max-width:300px" preload="metadata"><\/audio>';}else if(ct==='DOCUMENT'&&mediaUrl){html='<div>📄 <a href="'+mediaUrl+'" download="'+(fname||txt)+'" style="color:var(--primary)">'+(fname||txt)+'<\/a>'+fsize+'<\/div>';}else{html='<div>'+txt+'</div>';}
  let cap=m.media_caption?(m.media_caption.replace(/\n/g,'<br>')):'';
  if(cap)html+='<div style="margin-top:4px;font-size:13px">'+cap+'</div>';
  let nt=m.note?(m.note.replace(/\n/g,'<br>')):'';
  if(nt)html+='<div class="msg-note-inline">'+nt+'</div>';
  html+='<div class="msg-meta">'+m.direction+' · '+ct+' · '+new Date((m.created_at||0)*1000).toLocaleString()+check+'</div>';
  b.innerHTML=html;return b}

function appendChatMessage(msg, convId){
  let mc=document.getElementById('msg-container');if(!mc)return;
  let typeMap={1:'TEXT',2:'AD',3:'INTERACTIVE',4:'URL',5:'IMAGE',6:'VIDEO',7:'AUDIO',8:'DOCUMENT',9:'STICKER',10:'REACTION',11:'POLL',20:'REVOKE',91:'UNKNOWN_MEDIA',99:'OTHER'};
  let rawType=msg.type;let ctype=typeMap[parseInt(rawType)||rawType]||rawType||'?';
  let m={direction:msg.from_full?'incoming':'outgoing',content:msg.text||'['+ctype+']',content_type:ctype,created_at:Date.now()/1000,msg_id:msg.msgId||null,id:msg.db_id||null,conversation_id:convId||'',media_url:msg.media_url||null,media_key:msg.media_key||null,media_mimetype:msg.media_mimetype||null,media_file_name:msg.media_file_name||null,media_file_length:msg.media_file_length||null,media_caption:msg.media_caption||null};
  mc.insertBefore(renderMessage(m),mc.firstChild);
  let cnt=document.getElementById('msg-count');if(cnt){let n=parseInt(cnt.textContent)||0;cnt.textContent=(n+1)+' msgs';}
}
function refreshChatStatus(st){
  // Match bubble by msg_id and update checkmark
  let mc=document.getElementById('msg-container');if(!mc)return;
  let msgId=st.msgId;if(!msgId)return;
  let bubble=mc.querySelector('[data-msg-id="'+msgId+'"]');
  if(!bubble)return;
  let check=bubble.querySelector('.msg-check');
  if(!check)return;
  let s=(st.status||'').toString().toUpperCase();
  // Map status integer or string to checkmark
  let statusName='';
  if(s==='5'||s==='READ'||s==='READ_RECEIPT'){statusName='READ';check.innerHTML='\u2713\u2713';check.className='msg-check read';}
  else if(s==='4'||s==='DELIVERED'||s==='RECEIVED'){statusName='DELIVERED';check.innerHTML='\u2713\u2713';check.className='msg-check delivered';}
  else if(s==='3'||s==='SENT'||s==='SERVER_ACK'){statusName='SENT';check.innerHTML='\u2713';check.className='msg-check sent';}
  else if(s==='EXECUTED'){statusName='EXECUTED';check.innerHTML='\u23F3';check.className='msg-check exec';}
  else if(s==='6'||s==='FAILED'||s==='ERROR'){statusName='FAILED';check.innerHTML='\u2717';check.className='msg-check failed';}
  else return;
  check.setAttribute('data-msg-status',statusName);
}
function switchTab(name){
  currentTab=name;detailMode=null;wsClose();
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  render();
}
function render(){
  let m=document.getElementById('main');
  if(detailMode){
    if(detailMode.tab==='escalations') viewEscalation(detailMode.id);
    else if(detailMode.tab==='conversations') viewConversation(detailMode.id);
    else if(detailMode.tab==='plugins') viewPlugin(detailMode.id);    else if(detailMode.tab==='cluster') viewAgent(detailMode.id);    return;
  }
  if(currentTab==='escalations') renderEscalations(m);
  else if(currentTab==='conversations') renderConversations(m);
  else if(currentTab==='plugins') renderPlugins(m);
  else if(currentTab==='bots') renderBots(m);
  else if(currentTab==='audit') renderAudit(m);
  else if(currentTab==='cluster') renderCluster(m);
}
function setDetail(tab,id){detailMode={tab,id};}
function clearDetail(){detailMode=null;wsClose();document.getElementById('main').className='';render();}

// ── Escalations ───────────────────────────────────────────────────
let escFilter='pending';
async function renderEscalations(m){
  m.innerHTML='<div class="card"><h3>Loading...</h3></div>';
  let items=await api('/api/escalation?status='+escFilter);
  let html='<div class="card"><h3>🟡 Escalations</h3>';
  html+='<div class="row" style="margin-bottom:10px">';
  for(let s of ['pending','claimed','resolved'])
    html+=`<button class="${escFilter===s?'btn-primary':'btn-outline'} btn-sm" onclick="escFilter='${s}';clearDetail()">${s}</button>`;
  html+=' <span class="spacer"></span><span style="font-size:12px;color:var(--muted)">'+items.length+' items</span></div>';
  html+='<table><thead><tr><th>Conv</th><th>Reason</th><th>Priority</th><th>Status</th><th>When</th><th></th></tr></thead><tbody>';
  for(let e of items){
    let jid=e.conversation?e.conversation.jid:e.conversation_id.split(':').slice(1).join(':');
    html+=`<tr>
      <td><b>${e.bot_id}</b><br><span style="font-size:11px;color:var(--muted)">${jid||''}</span></td>
      <td>${e.reason||''}</td>
      <td><span class="badge badge-${e.priority}">${e.priority}</span></td>
      <td><span class="badge badge-${e.status}">${e.status}</span></td>
      <td style="font-size:11px">${new Date(e.created_at*1000).toLocaleString()}</td>
      <td><button class="btn-primary btn-sm" onclick="viewEscalation(${e.id})">View</button></td>
    </tr>`;
  }
  html+=items.length===0?'<tr><td colspan=6 style="text-align:center;color:var(--muted)">No escalations</td></tr>':'';
  html+='</tbody></table></div>';
  m.innerHTML=html;
}

async function viewEscalation(id){
  setDetail('escalations',id);
  let esc=await api('/api/escalation/'+id);
  let msgs=esc.messages||[];
  let html=`<div class="card"><div class="row"><h3>Escalation #${id}</h3><span class="spacer"></span>
    <span class="badge badge-${esc.status}">${esc.status}</span>
    <button class="btn-outline btn-sm" onclick="clearDetail()">← Back</button></div>`;
  html+=`<div style="font-size:13px;margin:8px 0"><b>Bot:</b> ${esc.bot_id} &nbsp; <b>Reason:</b> ${esc.reason} &nbsp; <b>Priority:</b> ${esc.priority}</div>`;

  // Messages
  html+='<div id="msg-container">';
  for(let m of msgs){
    if(m.direction==='note')continue;
    html+=renderMessage(m).outerHTML;
  }
  html+='</div>';

  // Actions
  html+='<div class="row" style="margin-top:12px">';
  if(esc.status==='pending')
    html+=`<button class="btn-primary" onclick="claimEscalation(${id})">Claim</button>`;
  if(esc.status==='claimed')
    html+=`<button class="btn-outline" onclick="unclaimEscalation(${id})">Unclaim</button>`;
  if(esc.status==='claimed'||esc.status==='pending'){
    html+=`<input id="reply-${id}" placeholder="Type reply..." style="flex:1">
           <button class="btn-primary" onclick="replyEscalation(${id})">Reply</button>`;
  }
  if(esc.status!=='resolved')
    html+=`<button class="btn-success" onclick="resolveEscalation(${id})">Resolve</button>`;
  html+='</div></div>';
  document.getElementById('main').innerHTML=html;
}

async function claimEscalation(id){
  let op=prompt('Operator name?','kenny');if(!op)return;
  await api('/api/escalation/'+id+'/claim',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({operator:op})});
  toast('Claimed','#3b82f6');viewEscalation(id);
}
async function unclaimEscalation(id){
  await api('/api/escalation/'+id+'/unclaim',{method:'POST'});
  toast('Unclaimed');viewEscalation(id);
}
async function resolveEscalation(id){
  await api('/api/escalation/'+id+'/resolve',{method:'POST'});
  toast('Resolved','#10b981');render();
}
async function replyEscalation(id){
  let inp=document.getElementById('reply-'+id);
  let text=inp.value.trim();if(!text)return;
  await api('/api/escalation/'+id+'/reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  toast('Sent','#10b981');inp.value='';viewEscalation(id);
}

// ── Conversations ─────────────────────────────────────────────────
let convBot='';
let convSearch='';
async function renderConversations(m){
  m.innerHTML='<div class="card"><h3>Loading...</h3></div>';
  let bots=await api('/api/listbot');
  let botIds=bots.map(b=>b.bot_id).filter(Boolean);
  if(!convBot&&botIds.length)convBot=botIds[0];

  let html='<div class="card"><h3>💬 Conversations</h3>';
  html+='<div class="row"><label>Bot: <select onchange="convBot=this.value;render()">';
  for(let b of botIds)html+=`<option ${b===convBot?'selected':''}>${b}</option>`;
  html+=`</select></label><input id="conv-search" placeholder="Search LID or PN..." style="flex:1" value="${convSearch||''}" oninput="convSearch=this.value;render()">
    <button class="btn-outline btn-sm" onclick="convSearch='';render()">Clear</button>
    <button class="btn-outline btn-sm" onclick="render()">Refresh</button></div>`;

  if(convBot){
    let convs=await api('/api/conversation?bot_id='+convBot);
    if(convSearch){
      let q=convSearch.toLowerCase();
      convs=convs.filter(c=>(c.jid||'').toLowerCase().includes(q)||(c.pn_jid||'').toLowerCase().includes(q)||(c.notify_name||'').toLowerCase().includes(q));
    }
    html+=`<table><thead><tr><th>JID</th><th>Name</th><th>PN</th><th>Type</th><th>Msgs</th><th>Last</th><th></th></tr></thead><tbody>`;
    for(let c of convs){
      let pn=c.pn_jid?c.pn_jid.replace('@s.whatsapp.net',''):'—';
      let name=c.notify_name||'—';
      html+=`<tr>
        <td><span style="font-size:12px">${c.jid}</span></td>
        <td><b>${name}</b></td>
        <td style="font-size:11px;color:var(--muted)">${pn}</td>
        <td>${c.type}</td><td>${c.message_count}</td>
        <td style="font-size:11px">${c.last_message_at?new Date(c.last_message_at*1000).toLocaleString():''}</td>
        <td><button class="btn-primary btn-sm" onclick="viewConversation('${c.id}')">Chat</button></td>
      </tr>`;
    }
    html+=convs.length===0?'<tr><td colspan=7 style="color:var(--muted)">No conversations</td></tr>':'';
    html+='</tbody></table>';
  }
  html+='</div>';m.innerHTML=html;
}

async function viewConversation(convId){
  setDetail('conversations',convId);
  let data=await api('/api/conversation/'+convId+'?limit=50');
  let parts=convId.split(':');let botId=parts[0];
  let name=data.notify_name||'';
  let pn=data.pn_jid?data.pn_jid.replace('@s.whatsapp.net',''):'';
  let title=name?`<b>${name}</b> <span style="font-size:11px;color:var(--muted);font-weight:normal">(jid=${data.jid}, pn=${pn})</span>`:`<b>${data.jid}</b>`;
  let html=`<div class="card chat-card"><div class="row" style="flex-shrink:0"><h3>${title}</h3><span class="spacer"></span>
    <span id="msg-count" style="font-size:12px;color:var(--muted)">${data.message_count} msgs</span>
    <span id="ws-dot" style="color:#10b981;font-size:18px" title="Live">●</span>
    <button class="btn-outline btn-sm" onclick="clearDetail()">← Back</button></div>
  <div class="chat-body" id="msg-container">`;
  for(let m of data.messages){
    if(m.direction==='note')continue;
    html+=renderMessage(m).outerHTML;
  }
  html+=`</div>
  <div class="chat-foot row"><textarea id="send-${convId}" rows="1" placeholder="Send... (Enter=send, Shift+Enter=newline)" style="flex:1;resize:none" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendConversationMsg('${convId}')}" oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
    <button class="btn-primary" onclick="sendConversationMsg('${convId}')">Send</button></div></div>`;
  let main=document.getElementById('main');
  main.className='chat-mode';
  main.innerHTML=html;
  wsConnectChat(botId,convId);
}

async function sendConversationMsg(convId){
  let inp=document.getElementById('send-'+convId);let text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='';inp.disabled=true;
  // Optimistic: show outgoing bubble immediately with clock icon
  let m={direction:'outgoing',content:text,content_type:'TEXT',created_at:Date.now()/1000,conversation_id:convId,status:'EXECUTED'};
  let mc=document.getElementById('msg-container');let bubble=null;
  if(mc){bubble=renderMessage(m);mc.insertBefore(bubble,mc.firstChild);}
  let cnt=document.getElementById('msg-count');if(cnt){let n=parseInt(cnt.textContent)||0;cnt.textContent=(n+1)+' msgs';}
  // Send in background, then replace bubble with real message (includes translation note etc.)
  try{
    let msg=await api('/api/conversation/'+convId+'/message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:text})});
    if(bubble&&mc){let real=renderMessage(msg);mc.replaceChild(real,bubble);bubble=null;}
  }catch(e){
    if(bubble)bubble.style.opacity='0.5';toast('Send failed','#ef4444');
  }finally{
    inp.disabled=false;inp.focus();
  }
}

async function toggleInlineEditor(name){
  let row=document.getElementById('plugin-edit-'+name);
  if(!row)return;
  if(row.style.display==='none'||!row.style.display){
    // Load config
    let data=await api('/api/plugin/'+name+'/config');
    let ta=document.getElementById('cfg-inline-'+name);
    if(ta)ta.value=JSON.stringify(data.config,null,2);
    // Close all other open editors
    document.querySelectorAll('[id^="plugin-edit-"]').forEach(r=>r.style.display='none');
    row.style.display='';
  }else{
    row.style.display='none';
  }
}
function closeInlineEditor(name){
  let row=document.getElementById('plugin-edit-'+name);
  if(row)row.style.display='none';
}
async function saveInlineConfig(name){
  let raw=document.getElementById('cfg-inline-'+name).value;
  let cfg;try{cfg=JSON.parse(raw)}catch(e){toast('Invalid JSON','#ef4444');return}
  await api('/api/plugin/'+name+'/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
  toast('Saved','#10b981');
  closeInlineEditor(name);
}
async function togglePluginInline(name){

    try{agents=await api('/api/cluster/agents');}catch(e){}

    <div style="font-size:12px;color:var(--muted);margin-bottom:6px">

    ${isCluster?`<select id="bots-filter-agent" style="width:160px" onchange="botsFilterAgent=this.value;refreshBotsTable()"><option value="">All Agents</option>${agents.map(a=>`<option value="${a.agent_id}" ${a.agent_id===botsFilterAgent?'selected':''}>${a.agent_id}</option>`).join('')}</select>`:''}

          <select id="import-env" style="width:120px">
            <option value="android">android</option><option value="smb_android">smb_android</option>
            <option value="ios">ios</option><option value="smb_ios">smb_ios</option>
          </select></div>
        <button class="btn-primary btn-sm" onclick="importBotFromUI()">Import</button>
      </div></div>`;
  }
  // Table
  html+=`<table><thead><tr><th>Bot ID</th>${isCluster?'<th>Agent</th>':''}<th>Status</th><th>Env</th><th>Uptime</th><th></th></tr></thead><tbody id="bots-tbody">`;
  for(let b of bots){
    html+=_botRowHtml(b,isCluster);
  }
  html+=bots.length===0?`<tr><td colspan=${isCluster?6:5} style="color:var(--muted)">No bots registered</td></tr>`:'';
  html+='</tbody></table></div>';m.innerHTML=html;

function _botRowHtml(b,isCluster){
  let upt=b.uptime_seconds?Math.floor(b.uptime_seconds/60)+'m':'—';
  let isRunning=b.status==='RUNNING';
  return `<tr id="bot-row-${b.bot_id}"><td><b>${b.bot_id}</b></td>
    ${isCluster?`<td style="font-size:11px;color:var(--muted)">${b.agent_id||'—'}</td>`:''}
    <td><span class="badge ${isRunning?'badge-resolved':'badge-pending'}">${b.status}</span></td>
    <td>${b.env||''}</td><td>${upt}</td>
    <td style="white-space:nowrap">
      <button class="btn-outline btn-sm" onclick="openBotLogs('${b.bot_id}')" title="View logs">📋</button>
      ${isRunning
        ?`<button class="btn-danger btn-sm" onclick="controlBot('${b.bot_id}','stop')">Stop</button>`
        :`<button class="btn-primary btn-sm" onclick="controlBot('${b.bot_id}','start')">Start</button>`
      }
    </td></tr>`;
}

async function refreshBotsTable(){
  let tbody=document.getElementById('bots-tbody');
  if(!tbody)return;
  let bots=await api('/api/listbot'+(botsFilterId?'?bot_id='+encodeURIComponent(botsFilterId):''));
  let isCluster=bots.some(b=>b.agent_id);
  if(isCluster&&botsFilterAgent){
    bots=bots.filter(b=>b.agent_id===botsFilterAgent);
  }
  let html='';
  for(let b of bots)html+=_botRowHtml(b,isCluster);
  if(!bots.length)html=`<tr><td colspan=${isCluster?6:5} style="color:var(--muted)">No bots registered</td></tr>`;
  tbody.innerHTML=html;
}

async function controlBot(botId,action){
  if(action==='start'){
    toast('Starting '+botId+'...','#3b82f6');
    await api('/api/startbot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bot_ids:[botId]})});
    toast('Started '+botId,'#10b981');
  }else{
    toast('Stopping '+botId+'...','#f59e0b');
    await api('/api/stopbot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bot_ids:[botId],mode:'force'})});
    toast('Stopped '+botId,'#10b981');
  }
  refreshBotsTable();
}

async function importBotFromUI(){
  let csv=document.getElementById('import-csv').value.trim();
  let env=document.getElementById('import-env').value;
  if(!csv){toast('Enter CSV data','#ef4444');return}
  if(csv.split(',').length!==6){toast('Need exactly 6 CSV fields','#ef4444');return}
  let isCluster=!!document.getElementById('bots-filter-agent');
  if(isCluster){
    let r=await api('/api/cluster/deploybot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accounts:[{data:csv,env}]})});
    toast('Deployed: '+r.success_count+' bots → '+r.deployed_to,'#10b981');
  }else{
    let r=await api('/api/importbot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accounts:[{data:csv,env}]})});
    toast('Imported: '+r.success_count+' bots','#10b981');
  }
  document.getElementById('import-csv').value='';
  refreshBotsTable();
}

async function scanAccounts(){
  let agentId=botsFilterAgent||'';
  let isCluster=!!document.getElementById('bots-filter-agent');
  if(isCluster){
    if(!agentId){toast('Select an Agent first','#f59e0b');return}
    toast('Scanning agent: '+agentId+'...','#3b82f6');
    let r=await api('/api/cluster/agents/'+encodeURIComponent(agentId)+'/scan',{method:'POST'});
    toast('Scan done: '+r.added+' new accounts','#10b981');
  }else{
    toast('Scanning local accounts...','#3b82f6');
    let r=await api('/api/scan',{method:'POST'});
    let msg='Scan done: '+r.accounts_before+' → '+r.accounts_after+' (+'+r.added+')';
    if(r.orphaned>0)msg+=' · purged '+r.orphaned+' orphaned';
    toast(msg,'#10b981');
  }
  refreshBotsTable();
}

async function viewAgent(agentId){

  let agent=agents.find(a=>a.agent_id===agentId);
  if(!agent){toast('Agent not found','#ef4444');clearDetail();return;}

  let bots=agent.bots||[];

  let allBots=await api('/api/listbot');
  let agentBots=allBots.filter(b=>b.agent_id===agentId);

  let html=`<div class="card"><div class="row"><h3>${agentId}</h3><span class="spacer"></span>

  html+='<table><thead><tr><th>Bot ID</th><th>Status</th><th>Env</th><th>Uptime</th><th>Migrate</th></tr></thead><tbody>';

  for(let b of agentBots){
    let upt=b.uptime_seconds?Math.floor(b.uptime_seconds/60)+'m':'';
    let isRunning=b.status==='RUNNING';

    let targetOpts=allAgents.filter(a=>a.agent_id!==agentId&&a.status==='online')

    html+=`<tr><td><b>${b.bot_id}</b></td>

async function migrateBot(botId){

  try{
    let r=await fetch('/api/bot/'+encodeURIComponent(botId)+'/logs/recent?lines=200');
    if(r.ok){
      let data=await r.json();
      history=data.lines||[];
    }
  }catch(e){}
  renderLogLines(history,true);

  // Connect WebSocket for live updates
  let proto=location.protocol==='https:'?'wss:':'ws:';
  let wsUrl=`${proto}//${location.host}/api/bot/${encodeURIComponent(botId)}/logs?tail=0`;
  _logWs=new WebSocket(wsUrl);
  _logWs.onopen=function(){
    document.getElementById('log-status').className='log-status live';
    document.getElementById('log-status').textContent='● LIVE';
  };
  _logWs.onmessage=function(e){
    renderLogLines([e.data],false);
  };
  _logWs.onclose=function(){
    if(_logClosing){_logClosing=false;return;}
    document.getElementById('log-status').className='log-status stale';
    document.getElementById('log-status').textContent='● Disconnected';
  };
  _logWs.onerror=function(){
    if(_logClosing)return;
    document.getElementById('log-status').className='log-status stale';
    document.getElementById('log-status').textContent='● Error';
  };
}

function closeBotLogs(){
  if(_logWs){
    _logClosing=true;
    _logWs.close();
    _logWs=null;
  }
  _logBotId='';
  document.getElementById('log-overlay').classList.add('hidden');
  document.getElementById('log-body').innerHTML='';
}

function renderLogLines(lines,replace){
  let body=document.getElementById('log-body');
  if(replace){body.innerHTML='';}
  let html='';
  for(let line of lines){
    let cls='log-line';
    let lc=line.toLowerCase();
    if(lc.includes('| error')||lc.includes('traceback'))cls+=' error';
    else if(lc.includes('| warning'))cls+=' warn';
    html+=`<div class="${cls}">${escHtml(line)}</div>`;
  }
  body.insertAdjacentHTML('beforeend',html);
  if(_logAutoScroll)body.scrollTop=body.scrollHeight;
  let countEl=document.getElementById('log-line-count');
  if(countEl){
    let n=body.querySelectorAll('.log-line').length;
    countEl.textContent=n+' line'+(n!==1?'s':'');
  }
}

function toggleLogAutoScroll(){
  _logAutoScroll=!_logAutoScroll;
  let btn=document.querySelector('.log-foot button');
  if(btn)btn.textContent='Auto-scroll: ' + (_logAutoScroll?'ON':'OFF');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Init ──────────────────────────────────────────────────────────
(async function(){
  // Detect cluster mode: only show Cluster tab if /api/cluster/agents responds
  try{
    let r=await fetch('/api/cluster/agents');
    if(r.ok||r.status===403){ // 403 = exists but requires auth
      document.getElementById('tab-cluster').style.display='';
    }
  }catch(e){/* standalone agent — tab stays hidden */}
  // Audit tab always visible
  document.getElementById('tab-audit').style.display='';
  render();
  // Auto-refresh list views only (detail views use WebSocket)
  setInterval(()=>{if(!detailMode)render()},15000);
})();
</script>
